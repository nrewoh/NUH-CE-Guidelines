<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUH CE Guidelines</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app-layout" class="layout">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>NUH CE Guidelines</h1>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="search-input" type="text" placeholder="Search titles or content..." autocomplete="off" />
        <button id="clear-search" class="clear-btn" title="Clear search" aria-label="Clear search">&times;</button>
      </div>
      <div id="result-count" class="result-count"></div>
    </div>
    <div id="doc-list" class="doc-list">
      <div class="loading">Loading library...</div>
    </div>
  </aside>
  <div id="scrim"></div>
  <main class="content">
    <div class="mobile-header">
      <button id="btn-menu" class="menu-toggle-btn" title="Toggle Sidebar">☰ Menu</button>
      <span class="mobile-app-title">NUH CE Guidelines</span>
    </div>
    <div id="viewer-empty" class="viewer-empty">
      <p>Select a document from the sidebar to preview it here.</p>
    </div>
    <iframe id="viewer" class="viewer" title="PDF viewer" hidden></iframe>
    <div id="pdf-canvas-viewer" class="pdf-canvas-viewer" hidden></div>
  </main>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js";
</script>
<script src="app.js"></script>
</body>
</html>
