<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>NUH CE Guidelines</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="layout">
  <div id="scrim"></div>

  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>NUH CE Guidelines</h1>
      <div class="search-box">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="search-input" type="text" placeholder="Search titles or content..." autocomplete="off" />
        <button id="clear-search" class="clear-btn" title="Clear search" aria-label="Clear search">&times;</button>
      </div>
      <div id="result-count" class="result-count"></div>
    </div>

    <ul id="doc-list" class="doc-list">
      <li class="loading">Loading library...</li>
    </ul>
  </aside>

  <main class="content">
    <div id="viewer-empty" class="viewer-empty">
      <p>Select a document from the sidebar to preview it here.</p>
    </div>
    
    <div id="viewer-container" hidden>
      <div id="topbar">
        <button id="btn-menu" title="Toggle Document Directory">☰</button>
        <div class="page-jump">
          <button id="btn-prev" title="Previous page">‹</button>
          <input id="page-input" type="text" value="1">
          <span>/ <span id="page-count">…</span></span>
          <button id="btn-next" title="Next page">›</button>
        </div>
        <div id="active-doc-title">Loading…</div>
        <div id="zoom-controls">
          <button id="btn-zoom-out" title="Zoom out">−</button>
          <span id="zoom-pct">100%</span>
          <button id="btn-zoom-in" title="Zoom in">+</button>
          <button id="btn-fit" title="Fit width">⤢</button>
        </div>
      </div>
      
      <div id="pdf-scroll-viewer">
        <div id="pages-container"></div>
        <div id="viewer-loading" hidden>Loading document pages…</div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/lunr.js/2.3.9/lunr.min.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
